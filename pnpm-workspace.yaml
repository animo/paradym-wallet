packages:
  - 'packages/*'
  - 'apps/*'

nodeLinker: hoisted

overrides:
  react-native-fs: 'catalog:'
  # Keep a single React/React Native copy. Several native modules (askar, masked-view)
  # and the wallet-sdk declare open-ended react-native peer ranges, and react-dom
  # (via react-native-web/tamagui) would otherwise drag in newer react than the
  # catalog-pinned native one. Pin everything to the SDK 56 versions.
  react: 'catalog:'
  react-dom: 19.2.3
  # Pin exactly: react-native 0.86 exists and open-ended peer ranges (tamagui, askar,
  # masked-view, wallet-sdk) would otherwise hoist it over the SDK 56 version.
  react-native: 0.85.3

patchedDependencies:
  '@dr.pogodin/react-native-fs': patches/@dr.pogodin__react-native-fs@2.39.0.patch
  '@credo-ts/openid4vc': patches/@credo-ts__openid4vc@0.6.3.patch

allowBuilds:
  '@hyperledger/anoncreds-react-native': true
  '@openwallet-foundation/askar-react-native': true
  '@shopify/react-native-skia': true
  cbor-extract: false
  esbuild: false
  protobufjs: false
  react-native-nitro-modules: true
  secp256k1: false

catalog:
  expo: ^56.0.0
  react-native: 0.85.3
  react: 19.2.3
  "@types/react": ~19.2.17
  typescript: ~6.0.3
  "@tanstack/react-query": ^5.90.14
  tsdown: ^0.15.6

  # Babel
  "@babel/core": ^7.29.0
  babel-plugin-syntax-hermes-parser: ^0.32.1
  babel-plugin-module-resolver: ^5.0.3

  # Credo / Agent / SSI
  credo-ts-didweb-anoncreds: 0.0.2-alpha.2
  rxjs: ^7.8.1
  query-string: ^9.3.1
  "@animo-id/eudi-wallet-functionality": 0.0.0-alpha-20250917090914
  "@animo-id/expo-secure-environment": 0.1.5
  "@animo-id/expo-digital-credentials-api": 0.4.0
  "@animo-id/expo-mdoc-data-transfer": 0.2.0-alpha.4
  "@animo-id/mdoc": 0.5.2
  "@openid4vc/oauth2": ^0.4.0
  "@openid4vc/openid4vp": ^0.4.0
  "@openid4vc/openid4vci": ^0.4.0
  "@openid4vc/utils": ^0.4.0
  fast-text-encoding: ^1.0.6
  "@types/fast-text-encoding": ^1.0.3
  "@credo-ts/anoncreds": 0.6.3
  "@credo-ts/askar": 0.6.3
  "@credo-ts/cheqd": 0.6.3
  "@credo-ts/core": 0.6.3
  "@credo-ts/openid4vc": 0.6.3
  "@credo-ts/question-answer": 0.6.3
  "@credo-ts/react-native": 0.6.3
  "@credo-ts/didcomm": 0.6.3
  "@hyperledger/anoncreds-react-native": 0.3.4
  "@hyperledger/anoncreds-shared": 0.3.4
  "@openwallet-foundation/askar-react-native": 0.6.0
  "@openwallet-foundation/askar-shared": 0.6.0
  buffer: 6.0.3
  "@astronautlabs/jsonpath": ^1.1.2

  # React Native
  react-native-heroicons: ^4.0.0
  "@react-native-masked-view/masked-view": 0.3.2
  "@react-native-picker/picker": ^2.11.1
  react-native-keychain: ^10.0.0
  react-native-get-random-values: ^2.0.0
  react-native-gesture-handler: ~2.31.1
  react-native-reanimated: 4.3.1
  react-native-safe-area-context: ~5.7.0
  react-native-screens: 4.25.2
  react-native-svg: 15.15.4
  # React Native FS is not maintained, and doesn't support new Arch
  # this seems to be the best maintained fork. We might want to switch
  # to Expo FileSystem, but Credo depends on react-native-fs
  "react-native-fs": "npm:@dr.pogodin/react-native-fs@^2.36.1"
  react-native-mmkv: ^4.1.0
  react-native-qrcode-svg: ^6.3.21
  react-native-reanimated-carousel: ^4.0.3
